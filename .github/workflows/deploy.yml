name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/r-runner
  CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/r-runner:buildcache

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image with shared cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Run startup check container
        run: |
          docker run -d --name r-runner-startup-check \
            -e RUNNER_TOKEN=ci-token \
            -p 8000:8000 \
            $IMAGE_NAME:${{ github.sha }}

          for i in {1..20}; do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          docker logs r-runner-startup-check | tee startup-check.log
          docker rm -f r-runner-startup-check

          grep -q '"ok":true' /tmp/health.json

      - name: Upload startup logs on failure
        if: failure() && hashFiles('startup-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: startup-check-log
          path: startup-check.log

      - name: Push image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p /opt/r-runner"

      - name: Create env file
        run: |
          cat > deploy.env <<'EOF'
          RUNNER_TOKEN=${{ secrets.RUNNER_TOKEN }}
          IMAGE_REPO=${{ github.repository_owner }}
          IMAGE_TAG=${{ github.sha }}
          EOF

      - name: Copy runtime files to server
        run: |
          scp compose.yaml deploy.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/r-runner/"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mv /opt/r-runner/deploy.env /opt/r-runner/.env"

      - name: Deploy on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd /opt/r-runner
            docker rm -f r-runner || true
            docker compose -f compose.yaml pull
            docker compose -f compose.yaml up -d --remove-orphans
            docker image prune -f
          '
