name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      web_image: ${{ steps.image.outputs.web_image }}
      script_image: ${{ steps.image.outputs.r_full_image }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Derive lowercase image names
        id: image
        run: |
          repo_lower="${GITHUB_REPOSITORY,,}"
          echo "web_image=ghcr.io/${repo_lower}-web" >> "$GITHUB_OUTPUT"
          echo "r_full_image=ghcr.io/${repo_lower}-r-full" >> "$GITHUB_OUTPUT"
          echo "r_base_image=ghcr.io/${repo_lower}-r-base" >> "$GITHUB_OUTPUT"
          echo "web_cache=ghcr.io/${repo_lower}:cache-web" >> "$GITHUB_OUTPUT"
          echo "r_full_cache=ghcr.io/${repo_lower}:cache-r-full" >> "$GITHUB_OUTPUT"
          echo "r_base_cache=ghcr.io/${repo_lower}:cache-r-base" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Detect R image Dockerfile changes
        id: r_changes
        run: |
          before_sha="${{ github.event.before }}"
          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            before_sha="${{ github.sha }}^"
          fi

          if ! git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=2 origin "${{ github.ref_name }}"
          fi

          r_full_changed=false
          if git diff --name-only "$before_sha" "${{ github.sha }}" | grep -Eq '^Dockerfile\.r-full$'; then
            r_full_changed=true
          fi

          r_base_changed=false
          if git diff --name-only "$before_sha" "${{ github.sha }}" | grep -Eq '^Dockerfile\.r-base$'; then
            r_base_changed=true
          fi

          if [ "$r_full_changed" = false ] && ! docker manifest inspect "${{ steps.image.outputs.r_full_image }}:latest" >/dev/null 2>&1; then
            echo "No published full R image found; forcing rebuild."
            r_full_changed=true
          fi

          if [ "$r_base_changed" = false ] && ! docker manifest inspect "${{ steps.image.outputs.r_base_image }}:latest" >/dev/null 2>&1; then
            echo "No published base R image found; forcing rebuild."
            r_base_changed=true
          fi

          echo "r_full_changed=$r_full_changed" >> "$GITHUB_OUTPUT"
          echo "r_base_changed=$r_base_changed" >> "$GITHUB_OUTPUT"

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            ${{ steps.image.outputs.web_image }}:latest
            ${{ steps.image.outputs.web_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.web_cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.web_cache }},mode=max

      - name: Build full R image
        if: steps.r_changes.outputs.r_full_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.r-full
          load: true
          tags: |
            ${{ steps.image.outputs.r_full_image }}:latest
            ${{ steps.image.outputs.r_full_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.r_full_cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.r_full_cache }},mode=max

      - name: Warm tiny R cache
        if: steps.r_changes.outputs.r_base_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.r-base
          load: true
          tags: ${{ steps.image.outputs.r_base_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.r_base_cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.r_base_cache }},mode=max

      - name: Reuse published full R image when unchanged
        if: steps.r_changes.outputs.r_full_changed != 'true'
        run: |
          docker pull "${{ steps.image.outputs.r_full_image }}:latest"
          docker tag "${{ steps.image.outputs.r_full_image }}:latest" "${{ steps.image.outputs.r_full_image }}:${{ github.sha }}"

      - name: Reuse published tiny R image when unchanged
        if: steps.r_changes.outputs.r_base_changed != 'true'
        run: |
          docker pull "${{ steps.image.outputs.r_base_image }}:latest"
          docker tag "${{ steps.image.outputs.r_base_image }}:latest" "${{ steps.image.outputs.r_base_image }}:${{ github.sha }}"

      - name: Run deployment-style check (web + full R image)
        run: |
          docker run -d --name r-runner-startup-check \
            -e RUNNER_TOKEN=ci-token \
            -e RUNNER_SCRIPT_IMAGE=${{ steps.image.outputs.r_full_image }}:${{ github.sha }} \
            -e RUNNER_DOCKER_BIN=/usr/bin/docker \
            -e RUNNER_SHARED_DIR=/tmp/r-runner-shared \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /usr/bin/docker:/usr/bin/docker:ro \
            -v /tmp/r-runner-shared:/tmp/r-runner-shared \
            -p 8000:8000 \
            "${{ steps.image.outputs.web_image }}:${{ github.sha }}"

          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          : > startup-check.log
          run_ok=0
          for i in {1..10}; do
            status_code=$(curl -sS -o /tmp/run.json -w '%{http_code}' -X POST http://localhost:8000/run \
              -H 'Content-Type: application/json' \
              -H 'Authorization: Bearer ci-token' \
              -d '{"script":"cat(2+2)"}')
            if [ "$status_code" = "200" ] && grep -q '"success":true' /tmp/run.json; then
              run_ok=1
              break
            fi
            echo "run attempt $i failed with status=$status_code" | tee -a startup-check.log
            cat /tmp/run.json | tee -a startup-check.log || true
            echo | tee -a startup-check.log
            sleep 1
          done

          if [ "$run_ok" -ne 1 ]; then
            echo 'Container runtime diagnostics:' | tee -a startup-check.log
            docker exec r-runner-startup-check sh -lc 'echo PATH=$PATH; ls -l /usr/bin/docker* || true; which docker || true; which docker.io || true; docker --version || true' | tee -a startup-check.log || true
            echo 'Last /run response payload:' | tee -a startup-check.log
            cat /tmp/run.json | tee -a startup-check.log || true
            echo | tee -a startup-check.log
          fi

          docker logs r-runner-startup-check | tee -a startup-check.log
          docker rm -f r-runner-startup-check

          grep -q '"ok":true' /tmp/health.json
          [ "$run_ok" -eq 1 ]

      - name: Upload startup logs on failure
        if: failure() && hashFiles('startup-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: startup-check-log
          path: startup-check.log

      - name: Push images
        run: |
          docker push "${{ steps.image.outputs.web_image }}:latest"
          docker push "${{ steps.image.outputs.web_image }}:${{ github.sha }}"
          docker push "${{ steps.image.outputs.r_full_image }}:latest"
          docker push "${{ steps.image.outputs.r_full_image }}:${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      SHARED_CADDY_BOOTSTRAP_VERSION: main-99ca08d
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Ensure deploy directory exists
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p /opt/r-runner"

      - name: Create env file
        env:
          SITE_DOMAIN_SECRET: ${{ secrets.SITE_DOMAIN }}
          PUBLIC_BASE_URL_SECRET: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          site_domain="${SITE_DOMAIN_SECRET:-}"
          public_base_url="${PUBLIC_BASE_URL_SECRET:-}"

          if [ -z "$site_domain" ] && [ -n "$public_base_url" ]; then
            site_domain="$(python -c 'import sys; from urllib.parse import urlparse; value = sys.argv[1].strip(); parsed = urlparse(value if "://" in value else f"https://{value}"); host = parsed.netloc or parsed.path; print(host.split("/")[0] if value else "")' "$public_base_url")"
          fi

          if [ -z "$site_domain" ]; then
            echo "Missing deployment domain: set secrets.SITE_DOMAIN or secrets.PUBLIC_BASE_URL" >&2
            exit 1
          fi

          if [ -z "$public_base_url" ]; then
            public_base_url="https://$site_domain"
          elif [ "$public_base_url" = "$site_domain" ]; then
            public_base_url="https://$public_base_url"
          elif [[ "$public_base_url" != *"://"* ]]; then
            public_base_url="https://$public_base_url"
          fi

          {
            printf 'RUNNER_TOKEN=%s\n' '${{ secrets.RUNNER_TOKEN }}'
            printf 'WEB_IMAGE=%s\n' '${{ needs.build.outputs.web_image }}:${{ github.sha }}'
            printf 'SCRIPT_IMAGE=%s\n' '${{ needs.build.outputs.script_image }}:${{ github.sha }}'
            printf 'SITE_DOMAIN=%s\n' "$site_domain"
            printf 'PUBLIC_BASE_URL=%s\n' "$public_base_url"
          } > deploy.env
      - name: Copy runtime files to server
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p /opt/r-runner/deploy/caddy/sites"
          scp -o StrictHostKeyChecking=accept-new compose.yaml deploy.env deploy/caddy/sites/r_runner.caddy "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/r-runner/"
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mv /opt/r-runner/r_runner.caddy /opt/r-runner/deploy/caddy/sites/r_runner.caddy && mv /opt/r-runner/deploy.env /opt/r-runner/.env"

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd /opt/r-runner
            docker compose -f compose.yaml pull

            bootstrap_version="${{ env.SHARED_CADDY_BOOTSTRAP_VERSION }}"
            bootstrap_tmp_dir="$(mktemp -d /tmp/shared-caddy-bootstrap.XXXXXX)"
            bootstrap_tarball="${bootstrap_tmp_dir}/shared-caddy-bootstrap-${bootstrap_version}.tar.gz"
            bootstrap_url="https://github.com/SebastianKrog/shared-caddy-bootstrap/releases/download/${bootstrap_version}/shared-caddy-bootstrap-${bootstrap_version}.tar.gz"
            trap "rm -rf \"${bootstrap_tmp_dir}\"" EXIT

            curl -fsSL "$bootstrap_url" -o "$bootstrap_tarball"
            tar -xzf "$bootstrap_tarball" -C "$bootstrap_tmp_dir" --strip-components=1

            SITE_DOMAIN="$(grep ^SITE_DOMAIN= .env | cut -d= -f2-)" \
            APP_NAME=r_runner \
            APP_SERVICE=r-runner \
            COMPOSE_FILE=compose.yaml \
            SITE_FILE=deploy/caddy/sites/r_runner.caddy \
            "$bootstrap_tmp_dir/bin/bootstrap.sh"

            docker image prune -f
          '
