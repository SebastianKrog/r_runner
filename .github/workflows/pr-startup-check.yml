name: PR startup check

on:
  pull_request:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONTAINER_NAME: r-runner-startup-check

jobs:
  startup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Derive lowercase image names
        id: image
        run: |
          repo_lower="${GITHUB_REPOSITORY,,}"
          echo "web_image=ghcr.io/${repo_lower}-web" >> "$GITHUB_OUTPUT"
          echo "r_base_image=ghcr.io/${repo_lower}-r-base" >> "$GITHUB_OUTPUT"
          echo "r_base_cache=ghcr.io/${repo_lower}:cache-r-base" >> "$GITHUB_OUTPUT"
          echo "web_cache=ghcr.io/${repo_lower}:cache-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Detect R image Dockerfile changes
        id: r_changes
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.pull_request.base.sha }}"
          fi

          r_base_changed=false
          if git diff --name-only "$base_ref" "${{ github.sha }}" | grep -Eq '^Dockerfile\.r-base$'; then
            r_base_changed=true
          fi

          if [ "$r_base_changed" = false ] && ! docker manifest inspect "${{ steps.image.outputs.r_base_image }}:latest" >/dev/null 2>&1; then
            echo "No published R base image found; forcing rebuild."
            r_base_changed=true
          fi

          echo "r_base_changed=$r_base_changed" >> "$GITHUB_OUTPUT"

      - name: Build R base image with shared cache
        if: github.event.pull_request.head.repo.full_name == github.repository && steps.r_changes.outputs.r_base_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.r-base
          load: true
          tags: ${{ steps.image.outputs.r_base_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.r_base_cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.r_base_cache }},mode=max

      - name: Build R base image without cache export
        if: github.event.pull_request.head.repo.full_name != github.repository && steps.r_changes.outputs.r_base_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.r-base
          load: true
          tags: ${{ steps.image.outputs.r_base_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.r_base_cache }}

      - name: Reuse published R base image when unchanged
        if: steps.r_changes.outputs.r_base_changed != 'true'
        run: |
          docker pull "${{ steps.image.outputs.r_base_image }}:latest"
          docker tag "${{ steps.image.outputs.r_base_image }}:latest" "${{ steps.image.outputs.r_base_image }}:${{ github.sha }}"

      - name: Build web image with shared cache
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ steps.image.outputs.web_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.web_cache }}
          cache-to: type=registry,ref=${{ steps.image.outputs.web_cache }},mode=max

      - name: Build web image without cache export
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ steps.image.outputs.web_image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.web_cache }}

      - name: Run startup check container
        run: |
          docker run -d --name "$CONTAINER_NAME" \
            -e RUNNER_TOKEN=ci-token \
            -e RUNNER_SCRIPT_IMAGE=${{ steps.image.outputs.r_base_image }}:${{ github.sha }} \
            -e RUNNER_DOCKER_BIN=/usr/bin/docker \
            -e RUNNER_SHARED_DIR=/tmp/r-runner-shared \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /usr/bin/docker:/usr/bin/docker:ro \
            -v /tmp/r-runner-shared:/tmp/r-runner-shared \
            -p 8000:8000 \
            "${{ steps.image.outputs.web_image }}:${{ github.sha }}"

          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          : > startup-check.log
          run_ok=0
          for i in {1..10}; do
            status_code=$(curl -sS -o /tmp/run.json -w '%{http_code}' -X POST http://localhost:8000/run \
              -H 'Content-Type: application/json' \
              -H 'Authorization: Bearer ci-token' \
              -d '{"script":"cat(2+2)"}')
            if [ "$status_code" = "200" ] && grep -q '"success":true' /tmp/run.json; then
              run_ok=1
              break
            fi
            echo "run attempt $i failed with status=$status_code" | tee -a startup-check.log
            cat /tmp/run.json | tee -a startup-check.log || true
            echo | tee -a startup-check.log
            sleep 1
          done

          if [ "$run_ok" -ne 1 ]; then
            echo 'Container runtime diagnostics:' | tee -a startup-check.log
            docker exec "$CONTAINER_NAME" sh -lc 'echo PATH=$PATH; ls -l /usr/bin/docker* || true; which docker || true; which docker.io || true; docker --version || true' | tee -a startup-check.log || true
            echo 'Last /run response payload:' | tee -a startup-check.log
            cat /tmp/run.json | tee -a startup-check.log || true
            echo | tee -a startup-check.log
          fi

          docker logs "$CONTAINER_NAME" | tee -a startup-check.log
          docker rm -f "$CONTAINER_NAME"

          grep -q '"ok":true' /tmp/health.json
          [ "$run_ok" -eq 1 ]

      - name: Upload startup logs on failure
        if: failure() && hashFiles('startup-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: startup-check-log
          path: startup-check.log
