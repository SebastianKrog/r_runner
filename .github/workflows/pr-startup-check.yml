name: PR startup check

on:
  pull_request:

permissions:
  contents: read
  packages: write

env:
  CONTAINER_NAME: r-runner-startup-check

jobs:
  startup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Derive lowercase image names
        id: image
        run: |
          repo_lower="${GITHUB_REPOSITORY,,}"
          echo "image_name=ghcr.io/${repo_lower}" >> "$GITHUB_OUTPUT"
          echo "cache_image=ghcr.io/${repo_lower}:buildcache" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image with shared cache
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.image_name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.cache_image }}
          cache-to: type=registry,ref=${{ steps.image.outputs.cache_image }},mode=max

      - name: Build image without cache export
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.image_name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.cache_image }}

      - name: Run startup check container
        run: |
          docker run -d --name "$CONTAINER_NAME" \
            -e RUNNER_TOKEN=ci-token \
            -p 8000:8000 \
            "${{ steps.image.outputs.image_name }}:${{ github.sha }}"

          for i in {1..20}; do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          docker logs "$CONTAINER_NAME" | tee startup-check.log
          docker rm -f "$CONTAINER_NAME"

          grep -q '"ok":true' /tmp/health.json

      - name: Upload startup logs on failure
        if: failure() && hashFiles('startup-check.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: startup-check-log
          path: startup-check.log
