services:
  r-runner:
    container_name: r-runner
    image: ${WEB_IMAGE:-ghcr.io/owner/r-runner-web:latest}
    env_file:
      - .env
    environment:
      RUNNER_SCRIPT_IMAGE: ${SCRIPT_IMAGE:-ghcr.io/owner/r-runner-r-full:latest}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    container_name: r-runner-caddy
    image: caddy:2
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    restart: unless-stopped
    depends_on:
      - r-runner
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
