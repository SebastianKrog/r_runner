services:
  r-runner:
    container_name: r-runner
    image: ${WEB_IMAGE:-ghcr.io/owner/r-runner-web:latest}
    env_file:
      - .env
    environment:
      RUNNER_SCRIPT_IMAGE: ${SCRIPT_IMAGE:-ghcr.io/owner/r-runner-r-full:latest}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      RUNNER_SHARED_DIR: ${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}:${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    container_name: r-runner-caddy
    image: caddy:2
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-localhost}
    command: >
      /bin/sh -c 'export SITE_DOMAIN="${SITE_DOMAIN:-$PUBLIC_BASE_URL}"; exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile'
    restart: unless-stopped
    depends_on:
      - r-runner
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
