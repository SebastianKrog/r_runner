services:
  r-runner:
    container_name: r-runner
    image: ${WEB_IMAGE:-ghcr.io/owner/r-runner-web:latest}
    env_file:
      - .env
    environment:
      RUNNER_SCRIPT_IMAGE: ${SCRIPT_IMAGE:-ghcr.io/owner/r-runner-r-full:latest}
      RUNNER_DOCKER_BIN: ${RUNNER_DOCKER_BIN:-/usr/bin/docker}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      RUNNER_SHARED_DIR: ${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}:${RUNNER_SHARED_DIR:-/tmp/r-runner-shared}
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - shared-proxy

networks:
  shared-proxy:
    external: true
    name: ${SHARED_PROXY_NETWORK:-shared-proxy}
